---
- name: EP3 - Aprovisionamiento corporativo CSR1kv
  hosts: routers
  gather_facts: no

  vars_files:
    - ../vars/vars_005D-10.yaml

  tasks:
    - name: Obtener running-config antes de cambios
      ios_command:
        commands:
          - show running-config
      register: running_before

    - name: Guardar respaldo inicial sin sobrescribir
      copy:
        content: "{{ running_before.stdout[0] }}"
        dest: "respaldo/backup_{{ alumno.codigo }}.cfg"
        force: no

    - name: Habilitar NETCONF
      ios_config:
        lines:
          - netconf-yang

    - name: Habilitar RESTCONF y HTTP seguro
      ios_config:
        lines:
          - restconf
          - ip http secure-server
          - ip http authentication local

    - name: Configurar hostname corporativo
      ios_config:
        lines:
          - "hostname {{ cliente.hostname }}"

    - name: Configurar banner de acceso
      ios_banner:
        banner: login
        text: "{{ router.banner }}"
        state: present

    - name: Configurar servidor NTP
      ios_config:
        lines:
          - "ntp server {{ router.ntp_server }}"

    - name: Configurar descripcion WAN en GigabitEthernet1
      ios_config:
        parents:
          - interface GigabitEthernet1
        lines:
          - "description {{ router.descripcion_wan }}"

    - name: Configurar Loopback de gestion
      ios_config:
        parents:
          - "interface Loopback{{ router.loopback_id }}"
        lines:
          - "ip address {{ router.loopback_ip }} {{ router.loopback_mask }}"
